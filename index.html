<!DOCTYPE html>
<html>
<head>
<title>API Tester Tool</title>
<style>
body{
font-family: Arial;
padding:40px;
background:#f5f5f5;
}

input{
width:400px;
padding:10px;
}

button{
padding:10px 20px;
margin-left:10px;
}

pre{
background:#000;
color:#00ff90;
padding:20px;
margin-top:20px;
overflow:auto;
}
</style>
</head>

<body>

<h2>API Tester Tool</h2>

<input type="text" id="url" placeholder="Enter API URL">
<button onclick="testAPI()">Send Request</button>

<pre id="result"></pre>

<script>

async function testAPI(){

const url = document.getElementById("url").value;

try{

const response = await fetch(url);
const data = await response.json();

document.getElementById("result").textContent =
JSON.stringify(data,null,2);

}catch(error){

document.getElementById("result").textContent =
"Error loading API";

}

}

</script>

</body>
</html>
